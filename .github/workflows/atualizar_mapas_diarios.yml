name: Atualização Diária de Mapas (TribalWars)

on:
  schedule:
    # Roda todos os dias às 04:00 UTC (01:00 Horário de Brasília)
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Permite rodar o script manualmente clicando num botão pelo painel do GitHub caso precise

permissions:
  contents: write # Permissão necessária para o Commit Automático funcionar no GH Actions

jobs:
  gerar-mapas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Baixar seu Repositório (Checkout)
        uses: actions/checkout@v4
        
      - name: Configurar ambiente Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip' # Acelera a execução baixando do cache

      - name: Instalar Extensões Python (Pillow, Pandas, Requests)
        run: |
          python -m pip install --upgrade pip
          pip install -r Automação/requirements.txt
          
      - name: Gerar Mapas (Core V2)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python gerar_mapas.py
          
      - name: Commit & Push (Enviar as imagens finalizadas de volta ao Repositório)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🗺️ Atualização Diária automática: Mapas e Rankings do TribalWars"
          file_pattern: 'Resultados/**/* Automação/config.json'
          pull_before_commit: true
          push_options: '--force-with-lease'
